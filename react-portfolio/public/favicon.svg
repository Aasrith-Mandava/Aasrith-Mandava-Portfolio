<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8531e" />
      <stop offset="100%" stop-color="#ffb347" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#e8531e" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Warm cream background -->
  <rect width="100" height="100" rx="24" fill="#f5efe6" />
  
  <!-- Outer ring in orange -->
  <rect x="8" y="8" width="84" height="84" rx="16" fill="none" stroke="url(#grad)" stroke-width="4" />
  
  <!-- Inner gradient box -->
  <rect x="18" y="18" width="64" height="64" rx="12" fill="url(#grad)" filter="url(#shadow)" />
  
  <!-- Initial letter -->
  <text x="50" y="66" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="46" fill="#f5efe6" text-anchor="middle" letter-spacing="-1">A</text>
</svg>
